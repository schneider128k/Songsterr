<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Songsterr Player</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #1a1d24;
      --fg: #e6e6e6;
      --muted: #9aa0a6;
      --accent: #ffb454;
      --accent-dim: #6f5320;
      --good: #4ade80;
      --warn: #f87171;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .panel {
      background: var(--panel);
      border-radius: 12px;
      padding: 32px 40px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    h1 {
      margin: 0 0 4px 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .artist {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 24px;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    button {
      flex: 1;
      padding: 12px 16px;
      background: #2a2e38;
      color: var(--fg);
      border: 1px solid #3a3f4d;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      font-family: inherit;
    }
    button:hover:not(:disabled) {
      background: #353a45;
      border-color: #4a4f5d;
    }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    button.primary {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }
    button.primary:hover:not(:disabled) {
      background: #8a6628;
    }
    .status {
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      font-size: 14px;
      line-height: 1.7;
    }
    .status .row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #2a2e38;
      padding: 6px 0;
    }
    .status .row:last-child { border-bottom: none; }
    .status .label { color: var(--muted); }
    .status .value { color: var(--fg); font-variant-numeric: tabular-nums; }
    .marker {
      color: var(--accent);
      font-weight: 500;
    }
    .progress {
      margin-top: 16px;
      height: 4px;
      background: #2a2e38;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.05s linear;
    }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .error {
      color: var(--warn);
      margin-top: 12px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1 id="title">Loading…</h1>
    <div class="artist" id="artist">&nbsp;</div>

    <div class="controls">
      <button id="btn-play" class="primary" disabled>▶ Play</button>
      <button id="btn-pause" disabled>⏸ Pause</button>
      <button id="btn-stop" disabled>⏹ Stop</button>
    </div>

    <div class="status">
      <div class="row">
        <span class="label">Bar</span>
        <span class="value" id="status-bar">—</span>
      </div>
      <div class="row">
        <span class="label">Section</span>
        <span class="value marker" id="status-marker">—</span>
      </div>
      <div class="row">
        <span class="label">Time signature</span>
        <span class="value" id="status-timesig">—</span>
      </div>
      <div class="row">
        <span class="label">Tempo</span>
        <span class="value" id="status-tempo">—</span>
      </div>
      <div class="row">
        <span class="label">Position</span>
        <span class="value" id="status-position">0:00 / 0:00</span>
      </div>
    </div>

    <div class="progress">
      <div class="progress-fill" id="progress"></div>
    </div>

    <div class="footer">
      Synth-only playback — kicks/snares/hats/toms/cymbals are Tone.js
      synths, not samples. Sound is diagnostic, not realistic.
    </div>

    <div class="error" id="error"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="/player.js"></script>
</body>
</html>
